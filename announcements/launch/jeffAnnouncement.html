<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="jomoetnt">
        <title>{title}</title>
        <link rel="stylesheet" href="../../styles.css">
        <link rel="icon" href="../..hparticleicon.png">
    </head>
    <body class="jeffBody">
        {jeffHeader}
        <div class="jeffArticle">
            <div class="jeffDate">
                {date}
            </div>
            <h1 class="articleTitle">{title}</h1>
            <div class=" jeffArticleColumnContainer">
                <div class="jeffHorizontalContainer">
                    <div class="jeffTextContainer">
                        <div class="jeffArticleParagraph">
                            The first announcement.
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {jeffFooter}
    </body>
</html>
